<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>רצים למקלט - גרסת השטן</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            box-sizing: border-box;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 450px;
            aspect-ratio: 16 / 9;
            border: 4px solid #444;
            background: #b4e4ff;
            image-rendering: pixelated;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        @media (max-width: 600px), (max-height: 600px) {
            #game-container {
                border: none;
                aspect-ratio: auto;
                height: 100%;
                width: 100%;
                max-width: none;
                max-height: none;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 15px;
            box-sizing: border-box;
            z-index: 50;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .level-text { 
            color: #facc15; 
            font-size: 16px; 
            font-weight: 900;
            text-shadow: 2px 2px 0 #b45309, 3px 3px 0 rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .hearts {
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 4px;
        }

        .distance-meter {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #f1f5f9;
            font-size: 13px;
            font-weight: 700;
            text-shadow: 1px 1px 2px #000;
            background: rgba(15,23,42,0.55);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
        }

        .indicator-box {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .status-msg {
            font-size: 11px;
            font-weight: 800;
            text-shadow: 1px 1px 2px #000;
            display: none;
            background: rgba(15,23,42,0.6);
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.08);
            letter-spacing: 0.5px;
        }

        #boost-indicator { color: #facc15; }
        #wings-indicator { color: #00ffff; }
        #size-indicator { color: #ff6b6b; }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            text-align: center;
            padding: 10px;
            transition: opacity 0.5s;
            overflow-y: auto;
        }

        .new-game-text {
            font-size: 38px;
            color: #facc15;
            text-shadow:
                3px 3px 0 #e85d04,
                6px 6px 0 rgba(0,0,0,0.3);
            margin-bottom: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            -webkit-text-stroke: 1px #e85d04;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .instructions {
            font-size: 13px;
            color: #e2e8f0;
            text-shadow: 1px 1px 3px #000;
            margin-bottom: 18px;
            line-height: 1.7;
            background: rgba(15,23,42,0.55);
            padding: 14px 20px;
            border-radius: 14px;
            max-width: 85%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .instructions b {
            color: #facc15;
            font-size: 14px;
        }

        .btn-start {
            background: linear-gradient(180deg, #facc15 0%, #eab308 100%);
            color: #1a1a2e;
            border: 3px solid #fff;
            padding: 16px 56px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #b45309, 0 8px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
            transition: all 0.1s;
            border-radius: 50px;
            flex-shrink: 0;
            letter-spacing: 1px;
            text-shadow: none;
        }

        .btn-start:hover { background: linear-gradient(180deg, #fde047 0%, #facc15 100%); }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45309, 0 3px 8px rgba(0,0,0,0.2); }

        @media (max-height: 400px) {
            .new-game-text { font-size: 22px; margin-bottom: 5px; }
            .instructions { font-size: 11px; padding: 8px 12px; margin-bottom: 8px; line-height: 1.4; }
            .btn-start { padding: 10px 36px; font-size: 16px; }
        }
        .hidden { display: none !important; }

        #rotate-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            gap: 25px;
            padding: 30px;
            box-sizing: border-box;
        }
        #rotate-msg .rotate-icon {
            font-size: 60px;
            animation: rotatePhone 2.5s ease-in-out infinite;
        }
        #rotate-msg .rotate-title {
            font-size: 24px;
            font-weight: 900;
            color: #facc15;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            line-height: 1.4;
            padding: 0 10px;
        }
        #rotate-msg .rotate-sub {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }
        #rotate-msg .rotate-arrow {
            font-size: 36px;
            animation: bounce-lr 1.5s ease-in-out infinite;
        }
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        @keyframes bounce-lr {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(10px); opacity: 1; }
        }
        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-msg { display: flex; }
            #game-container { display: none; }
        }
    </style>
</head>
<body>

<div id="rotate-msg">
    <div class="rotate-icon">📱</div>
    <div class="rotate-title">סובב את המכשיר<br>לרוחב כדי לשחק</div>
    <div class="rotate-arrow">↻</div>
    <div class="rotate-sub">המשחק פועל רק במצב רוחבי</div>
</div>

<div id="game-container">

            <div id="size-indicator" class="status-msg">🐟 חריימה חריף! 🐟</div>
            <div id="dino-indicator" class="status-msg" style="color:#22c55e">🦕 דינוזאור! 🦕</div>
        </div>

        <div class="distance-meter" id="dist-ui">מרחק: 0 מ'</div>

        <div id="overlay">
            <div class="new-game-text" id="title-text">רצים למקלט</div>
            <div class="instructions" id="subtitle-text">

            <button class="btn-start" id="start-btn">התחל</button>
        </div>
    </div>
</div>

    // --- משתני המצב ---
    let canvas, ctx, startBtn, overlay, boostUi, wingsUi, sizeUi;

    const STAIR_GROUPS = [
        { start: 100, count: 3, sw: 22, sh: 12 },
        { start: 500, count: 2, sw: 24, sh: 13 },
        { start: 1000, count: 5, sw: 20, sh: 10 },
        { start: 1550, count: 1, sw: 28, sh: 18 },
    ];
    const STAIR_REPEAT = 2100;

    function buildStairSteps() {
        const steps = [];
        for (const g of STAIR_GROUPS) {
            let x = g.start;
            for (let i = 0; i < g.count; i++) {
                steps.push({ start: x, w: g.sw, h: (i + 1) * g.sh });
                x += g.sw;
            }
            // plateau at top
            steps.push({ start: x, w: g.sw * 1.5, h: g.count * g.sh });
        }
        return steps;
    }
    const ALL_STEPS = buildStairSteps();

    function getStepX(step) {
        return (step.start - bgScroll % STAIR_REPEAT + STAIR_REPEAT) % STAIR_REPEAT - 80;
    }

    function getGroundLevel(px, pw) {
        const baseGround = 210;
        let highest = baseGround;
        for (const step of ALL_STEPS) {
            let sx = getStepX(step);
            if (px + pw > sx + 2 && px < sx + step.w - 2) {
                let level = baseGround - step.h;
                if (level < highest) highest = level;
            }
        }
        return highest;
    }

    // --- פונקציית הציור ---
    function drawSprite(ctx, map, x, y, scale, colors) {
        if (!map || !colors) return;
        const size = Math.ceil(scale) + 0.6; 
        for (let rIdx = 0; rIdx < map.length; rIdx++) {
            const row = map[rIdx];
            if (!row) continue;
            for (let cIdx = 0; cIdx < row.length; cIdx++) {
                const char = row[cIdx] || ' ';
                if (char !== ' ') {
                    ctx.fillStyle = colors[char] || '#000';
                    ctx.fillRect(Math.floor(x + cIdx * scale), Math.floor(y + rIdx * scale), size, size);
                }
            }
        }
    }

    // --- אובייקטים ---
    const player = {
        x: 60, 
        w: 35 * SCALE, h: 35 * SCALE, 
        dy: 0, jumpPower: -6.5, grav: 0.28,
        jumpCount: 0, isJumping: false, anim: 0,
        groundOffset: 0,
        get baseY() { return (210 + this.groundOffset) - (35 * SCALE); },
        get y() { return this.baseY + this.dy_pos; },
        dy_pos: 0,
        update(speedMult) {
            let ground = getGroundLevel(this.x, this.w);
            let newOffset = ground - 210;

            if (wingsTimer > 0) {
                this.groundOffset = newOffset;
                this.dy_pos = -75; 
                this.isJumping = false;
                this.jumpCount = 0;
                this.dy = 0;
            } else if (this.isJumping || this.dy_pos < 0) {
                this.dy += this.grav;
                this.dy_pos += this.dy;
                let feetY = (210 + this.groundOffset) + this.dy_pos;
                if (this.dy > 0 && feetY >= ground) {
                    this.groundOffset = newOffset;
                    this.dy_pos = 0;
                    this.dy = 0;
                    this.isJumping = false;
                    this.jumpCount = 0;
                }
            } else {
                if (newOffset > this.groundOffset + 2) {
                    this.dy_pos = this.groundOffset - newOffset;
                    this.groundOffset = newOffset;
                    this.isJumping = true;
                    this.dy = 0;
                } else {
                    this.groundOffset = newOffset;
                }
                this.anim += 0.2 * speedMult;
            }
        },
        draw(hasBoost, hasWings, hasSize) {
            const isDino = dinoTimer > 0;
            const frames = isDino ? [dino_f1, dino_f2] : [boy_f1, boy_f2];
            const colors = isDino ? DINO_COLORS : BOY_COLORS;
            const frameIdx = (this.isJumping || wingsTimer > 0) ? 1 : Math.floor(this.anim) % 2;
            const bounce = (!this.isJumping && wingsTimer === 0) ? Math.sin(this.anim * Math.PI) * 2 : 0;
            let currentScale = SCALE;
            let sizeOffsetY = 0;
            if (hasSize) {
                currentScale *= 1.5;
                sizeOffsetY = -(35 * SCALE * 0.5);
            }
            if (isDino) {
                currentScale *= 1.15;
                let dinoH = 20 * currentScale;
                let normalH = 35 * SCALE;
                sizeOffsetY += (normalH - dinoH);
            }
            let drawY = this.y + bounce + sizeOffsetY;
            
            if (wingsTimer === 0 && this.dy_pos === 0) {
                let shadowY = 210 + this.groundOffset;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath(); ctx.ellipse(this.x + (this.w/2), shadowY, 10 * (hasSize?1.5:1) * (isDino?1.2:1), 3, 0, 0, Math.PI*2); ctx.fill();
            }
            
            if (hasWings) {
                ctx.save();
                ctx.globalAlpha = 0.6 + Math.sin(frame/5) * 0.3;
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.moveTo(this.x, drawY + 10); ctx.lineTo(this.x - 20, drawY - 15); ctx.lineTo(this.x, drawY + 25); ctx.fill();
                ctx.beginPath(); ctx.moveTo(this.x + this.w, drawY + 10); ctx.lineTo(this.x + this.w + 20, drawY - 15); ctx.lineTo(this.x + this.w, drawY + 25); ctx.fill();
                ctx.restore();
            }

            if (hasBoost) {
                ctx.globalAlpha = 0.4;
                drawSprite(ctx, frames[frameIdx], this.x - 12, drawY, currentScale, colors);
                ctx.globalAlpha = 1.0;
            }
            drawSprite(ctx, frames[frameIdx], this.x, drawY, currentScale, colors);
        },
        jump() { 
            if (wingsTimer > 0) return;
            if (this.jumpCount < 2) {
                this.dy = this.jumpPower; 
                this.isJumping = true;
                this.jumpCount++;
            }
        }
    };

    class Entity {
        constructor(type) {
            const rand = Math.random();
            if (type) { this.type = type; } 
            else {
                if (rand < 0.08) this.type = 'ARAK';
                else if (rand < 0.16) this.type = 'FALAFEL';
                else if (rand < 0.24) this.type = 'CHRAIME';
                else if (rand < 0.30) this.type = 'AMBA';
                else if (rand < 0.45) this.type = 'MISSILE'; 
                else if (rand < 0.55) this.type = 'POOP';
                else if (rand < 0.70) this.type = 'SKELETON';
                else if (rand < 0.85) this.type = 'DEVIL';
                else this.type = 'TRASH';
            }
            
            let baseScale = SCALE;
            if (this.type === 'POOP') baseScale = SCALE * 0.8;
            if (this.type === 'SKELETON') baseScale = SCALE * 1.1;
            if (this.type === 'DEVIL') baseScale = SCALE * 1.15;
            this.scale = baseScale;
            this.w = 35 * this.scale; 
            this.h = 35 * this.scale; 
            
            if (this.type === 'MISSILE') {
                this.x = 80 + Math.random() * (v_width - 150);
                this.y = -60; 
                this.speedY = 1.2 + Math.random() * 0.8;
            } else {
                this.x = v_width + 20;
                this.y = 210 - this.h;
                if (this.type === 'FALAFEL' || this.type === 'ARAK' || this.type === 'CHRAIME' || this.type === 'AMBA') {
                    this.y = 120 + Math.random() * 70;
                }
                if(this.type === 'SHELTER') { 
                    this.scale = 2.5 * SCALE; 
                    this.w = 30 * this.scale; 
                    this.h = 30 * this.scale;
                    this.y = 210 - this.h; 
                }
            }
        }
        update(speed) { 
            if (this.type === 'MISSILE') {
                this.y += this.speedY; 
                this.x -= speed * 0.2; 
            } else {
                this.x -= speed;
                if (this.type !== 'FALAFEL' && this.type !== 'ARAK' && this.type !== 'CHRAIME' && this.type !== 'AMBA') {
                    let ground = getGroundLevel(this.x, this.w);
                    this.y = ground - this.h;
                } else {
                    let ground = getGroundLevel(this.x, this.w);
                    if (this.y + this.h > ground) {
                        this.y = ground - this.h - 5;
                    }
                }
            }
        }
        drawLabel(text, color = '#fff', drawW) {
            let w = drawW || this.w;
            ctx.save();
            ctx.font = 'bold 9px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.lineWidth = 3; ctx.strokeStyle = '#000';
            ctx.strokeText(text, this.x + (w / 2), this.y - 8);
            ctx.fillStyle = color; ctx.fillText(text, this.x + (w / 2), this.y - 8);
            ctx.restore();
        }
        draw() {
            if(this.type !== 'ARAK' && this.type !== 'FALAFEL' && this.type !== 'CHRAIME' && this.type !== 'MISSILE' && this.type !== 'AMBA') {
                let shadowY = getGroundLevel(this.x, this.w);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath(); ctx.ellipse(this.x + (this.w/2), shadowY, 12, 3, 0, 0, Math.PI*2); ctx.fill();
            }
            if(this.type === 'ARAK') { let s = this.scale * 1.3; let sw = 40 * s; drawSprite(ctx, arak_sprite, this.x, this.y, s, ARAK_COLORS); this.drawLabel("ערק", "#60a5fa", sw); }
            else if(this.type === 'POOP') drawSprite(ctx, poop_sprite, this.x, this.y, this.scale, POOP_COLORS);
            else if(this.type === 'SKELETON') drawSprite(ctx, skeleton_sprite, this.x, this.y, this.scale, SKELETON_COLORS);
            else if(this.type === 'DEVIL') drawSprite(ctx, devil_sprite, this.x, this.y, this.scale, DEVIL2_COLORS);
            else if(this.type === 'TRASH') drawSprite(ctx, trash_sprite, this.x, this.y, this.scale, TRASH_COLORS);
            else if(this.type === 'FALAFEL') { drawSprite(ctx, falafel_sprite, this.x, this.y, this.scale, FALAFEL_COLORS); this.drawLabel("פלאפל", "#fbbf24"); }
            else if(this.type === 'CHRAIME') { drawSprite(ctx, chraime_sprite, this.x, this.y, this.scale * 0.9, CHRAIME_COLORS); this.drawLabel("חריימה", "#fff"); }
            else if(this.type === 'AMBA') { drawSprite(ctx, amba_sprite, this.x, this.y, this.scale * 1.2, AMBA_COLORS); this.drawLabel("עמבה", "#f59e0b"); }
            else if(this.type === 'MISSILE') {
                let ms = this.scale * 1.5;
                drawSprite(ctx, vertical_missile_sprite, this.x, this.y, ms, MISSILE_COLORS);
                let cx = this.x + 20 * ms;
                let ey = this.y;
                let flicker = Math.sin(frame * 0.5) * 2;
                let flicker2 = Math.cos(frame * 0.7) * 1.5;
                ctx.fillStyle = '#facc15';
                ctx.beginPath(); ctx.moveTo(cx - 4 * ms, ey); ctx.lineTo(cx, ey - (10 + flicker) * ms); ctx.lineTo(cx + 4 * ms, ey); ctx.fill();
                ctx.fillStyle = '#f97316';
                ctx.beginPath(); ctx.moveTo(cx - 3 * ms, ey); ctx.lineTo(cx + flicker2, ey - (7 + flicker) * ms); ctx.lineTo(cx + 3 * ms, ey); ctx.fill();
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.moveTo(cx - 2 * ms, ey); ctx.lineTo(cx, ey - (4 + flicker2) * ms); ctx.lineTo(cx + 2 * ms, ey); ctx.fill();
            }
            else if(this.type === 'SHELTER') {
                let spriteW = 40 * this.scale;
                drawSprite(ctx, shelter_sprite, this.x, this.y, this.scale, SHELTER_COLORS);
                ctx.save(); ctx.fillStyle = '#000'; ctx.font = 'bold 18px Arial, sans-serif'; ctx.textAlign = 'center';
                ctx.lineWidth = 4; ctx.strokeStyle = '#fff';
                ctx.strokeText("מרחב מוגן", this.x + (spriteW / 2), this.y - 12);
                ctx.fillText("מרחב מוגן", this.x + (spriteW / 2), this.y - 12);
                ctx.restore();
            }
        }
    }

    // --- רקע וציור ---
    function drawRoundRect(ctx, x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
    }

    function drawSky() {
        const T = THEMES[currentLevel - 1];
        const grd = ctx.createLinearGradient(0, 0, 0, 210);
        grd.addColorStop(0, T.skyTop);
        grd.addColorStop(0.5, T.skyMid);
        grd.addColorStop(1, T.skyBot);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, v_width, 210);

        const sunX = v_width - 60;
        ctx.fillStyle = T.sunColor[0];
        ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(sunX, 35, 30, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = T.sunColor[1];
        ctx.beginPath(); ctx.arc(sunX, 35, 18, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = T.sunColor[2];
        ctx.beginPath(); ctx.arc(sunX, 35, 12, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,' + T.cloudAlpha + ')';
        const clouds = [{ x: 50, y: 25, r: 14 },{ x: 200, y: 40, r: 10 },{ x: 350, y: 20, r: 12 }];
        for (const c of clouds) {
            let cx = (c.x - (bgScroll * 0.05) % (v_width + 100) + v_width + 100) % (v_width + 100) - 50;
            ctx.beginPath(); ctx.arc(cx, c.y, c.r, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + c.r, c.y + 2, c.r * 0.7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx - c.r * 0.8, c.y + 2, c.r * 0.6, 0, Math.PI * 2); ctx.fill();
        }

        ctx.strokeStyle = T.birdColor;
        ctx.lineWidth = 1;
        for (let b = 0; b < 4; b++) {
            let bx = (80 + b * 130 - (bgScroll * 0.3) % (v_width + 200) + v_width + 200) % (v_width + 200) - 100;
            let by = 15 + b * 12 + Math.sin(frame * 0.08 + b) * 4;
            ctx.beginPath();
            ctx.moveTo(bx - 5, by + 2); ctx.quadraticCurveTo(bx - 2, by - 3, bx, by);
            ctx.moveTo(bx, by); ctx.quadraticCurveTo(bx + 2, by - 3, bx + 5, by + 2);
            ctx.stroke();
        }
    }

        ctx.fillStyle = T.dirtBody; ctx.fillRect(0, groundY + 10, v_width, 50);
        ctx.fillStyle = T.dirtDetail;
        for (let x = - (bgScroll % 30); x < v_width + 30; x += 30) {
            ctx.fillRect(x, groundY + 12, 14, 3);
            ctx.fillRect(x + 15, groundY + 25, 12, 3);
        }

        for (const step of ALL_STEPS) {
            let sx = getStepX(step);
            if (sx > v_width + 10 || sx + step.w < -10) continue;
            let top = groundY - step.h;
            ctx.fillStyle = T.dirtBody;
            ctx.fillRect(sx, top + 6, step.w, step.h + 4);
            ctx.fillStyle = T.grassTop;
            ctx.fillRect(sx, top, step.w, 6);
            ctx.fillStyle = T.grassZig;
            for (let gx = sx; gx < sx + step.w; gx += 10) {
                let w = Math.min(10, sx + step.w - gx);
                ctx.beginPath();
                ctx.moveTo(gx, top + 6); ctx.lineTo(gx + w/2, top + 12); ctx.lineTo(gx + w, top + 6);
                ctx.fill();
            }
        }
    }

    function update() {
        frame++;
        let speedMult = 1;
        if (hitCooldown > 0) hitCooldown--;
        if (dinoTimer > 0) { dinoTimer--; const dinoUi = document.getElementById('dino-indicator'); if(dinoUi) dinoUi.style.display = 'block'; } else { const dinoUi = document.getElementById('dino-indicator'); if(dinoUi) dinoUi.style.display = 'none'; }
        if (boostTimer > 0) { boostTimer--; speedMult = BOOST_MULTIPLIER; if(boostUi) boostUi.style.display = 'block'; } else { if(boostUi) boostUi.style.display = 'none'; }
        if (wingsTimer > 0) { wingsTimer--; wingsUi.style.display = 'block'; } else { if(wingsUi) wingsUi.style.display = 'none'; }
        if (sizeTimer > 0) { sizeTimer--; sizeUi.style.display = 'block'; } else { if(sizeUi) sizeUi.style.display = 'none'; }
        if (manualBoostTimer > 0) { manualBoostTimer--; speedMult *= 1.4; }
        if (manualSlowTimer > 0) { manualSlowTimer--; speedMult *= 0.6; }

        let baseGameSpeed = LEVEL_SPEEDS[currentLevel - 1];
        let activeSpeed = isPlaying ? (baseGameSpeed * speedMult) : 0.5; 
        bgScroll += activeSpeed; 
        if (!isPlaying) return; 

        player.update(speedMult);
        let goal = LEVEL_GOALS[currentLevel - 1];

        if(score >= goal && !shelterMode) {
            obstacles.push(new Entity('SHELTER'));
            shelterMode = true;
        }

        let safetyBuffer = Math.min(60, goal * 0.2); 
        let spawnRate = Math.floor(LEVEL_SPAWN_RATES[currentLevel - 1] / (baseGameSpeed * speedMult));
        if(!shelterMode && score < (goal - safetyBuffer) && frame % Math.max(30, spawnRate) === 0) {
            obstacles.push(new Entity());
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i]; o.update(baseGameSpeed * speedMult);
            let pW = player.w; let pH = player.h;
            let pY = player.y;
            if (sizeTimer > 0) { pW *= 1.5; pH *= 1.5; pY -= (35 * SCALE * 0.5); }
            const pBox = { x: player.x+5, y: pY+5, w: pW-10, h: pH-10 };
            let oBox = { x: o.x + 5, y: o.y + 5, w: o.w - 10, h: o.h - 10 };
            if (pBox.x < oBox.x + oBox.w && pBox.x + pBox.w > oBox.x && pBox.y < oBox.y + oBox.h && pBox.y + pBox.h > oBox.y) {
                if(o.type === 'SHELTER') { endLevel(true); } 
                else if(o.type === 'ARAK') { boostTimer = BOOST_DURATION; score += 15; obstacles.splice(i, 1); } 
                else if(o.type === 'FALAFEL') { wingsTimer = WINGS_DURATION; score += 20; obstacles.splice(i, 1); } 
                else if(o.type === 'CHRAIME') { sizeTimer = SIZE_DURATION; score += 10; let maxLives = currentLevel >= 4 ? 5 : 3; if(lives < maxLives) { lives++; updateHeartsUI(); } obstacles.splice(i, 1); }
                else if(o.type === 'AMBA') { dinoTimer = 180; score += 15; obstacles.splice(i, 1); }
                else if(o.type === 'MISSILE') { hit(); }
                else { if (wingsTimer === 0 && player.dy_pos > -30) hit(); }
            } else if (o.x < -100 || o.y > V_HEIGHT + 100) { obstacles.splice(i, 1); }
        }
        if(!shelterMode) { score += (baseGameSpeed * speedMult) * 0.05; }
        const distText = document.getElementById('dist-ui');
        if(distText) distText.innerText = "מרחק: " + Math.floor(score) + "/" + goal + " מ'";
    }

    function hit() { 
        if (hitCooldown > 0) return;
        lives--;
        updateHeartsUI();
        if(ctx) { ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(0,0,v_width,V_HEIGHT); }
        if (lives <= 0) {
            endLevel(false);
        } else {
            hitCooldown = 90;
        }
    }

    function updateHeartsUI() {
        const heartsEl = document.getElementById('hearts-ui');
        if (!heartsEl) return;
        let txt = '';
        let maxLives = currentLevel >= 4 ? 5 : 3;
        for (let i = 0; i < maxLives; i++) {
            txt += i < lives ? '❤️' : '🖤';
        }
        heartsEl.innerText = txt;
    }

    function render() {
        if (!ctx) return;
        ctx.save(); 
        ctx.scale(canvas.height / V_HEIGHT, canvas.height / V_HEIGHT);
        ctx.clearRect(0, 0, v_width, V_HEIGHT);
        drawSky(); drawSkyline(); drawPixelGround();
        if (isPlaying) {
            obstacles.forEach(o => o.draw());
            if (hitCooldown > 0 && Math.floor(frame / 4) % 2 === 0) {
                ctx.globalAlpha = 0.3;
            }
            player.draw(boostTimer > 0, wingsTimer > 0, sizeTimer > 0);
            ctx.globalAlpha = 1;
        } else {
            player.draw(false, false, false);
        }
        ctx.restore(); requestAnimationFrame(render);
    }

    function endLevel(win) {
        isPlaying = false; 
        if(overlay) { overlay.classList.remove('hidden'); overlay.style.opacity = "1"; }
        const titleText = document.getElementById('title-text');
        const startBtnText = document.getElementById('start-btn');
        if (win) {
            if (currentLevel < 5) {
                if(titleText) titleText.innerText = "שלב " + currentLevel + " עבר!";
                if(startBtnText) startBtnText.innerText = "המשך לשלב " + (currentLevel + 1); currentLevel++;
            } else {
                if(titleText) titleText.innerText = "ניצחת!";
                if(startBtnText) startBtnText.innerText = "שוב"; currentLevel = 1;
            }
        } else {
            if(titleText) titleText.innerText = "נפסלת!"; 
            if(startBtnText) startBtnText.innerText = "נסה שוב";
        }
    }

    function initGame() {
        score = 0; boostTimer = 0; wingsTimer = 0; sizeTimer = 0; dinoTimer = 0; manualBoostTimer = 0; manualSlowTimer = 0;
        lives = currentLevel >= 4 ? 5 : 3; hitCooldown = 0;
        obstacles = []; isPlaying = true; shelterMode = false;
        updateHeartsUI();
        const levelText = document.getElementById('level-ui');
        if(levelText) levelText.innerText = "שלב " + currentLevel;
        if(overlay) {
            overlay.style.opacity = "0";
            setTimeout(() => overlay.classList.add('hidden'), 500);
        }
    }

    function resize() {
        if (!canvas) return;
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        v_width = (canvas.width / canvas.height) * V_HEIGHT;
        if (ctx) ctx.imageSmoothingEnabled = false;
    }

    window.onload = () => {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        startBtn = document.getElementById('start-btn');
        overlay = document.getElementById('overlay');
        boostUi = document.getElementById('boost-indicator');
        wingsUi = document.getElementById('wings-indicator');
        sizeUi = document.getElementById('size-indicator');
        resize();
        if(startBtn) startBtn.addEventListener('click', initGame);
        window.addEventListener('keydown', e => { 
            if (isPlaying) {
                if (e.code === 'Space' || e.code === 'ArrowUp') player.jump(); 
                if (e.code === 'ArrowRight') { manualBoostTimer = MANUAL_CONTROL_DURATION; manualSlowTimer = 0; }
                if (e.code === 'ArrowLeft') { manualSlowTimer = MANUAL_CONTROL_DURATION; manualBoostTimer = 0; }
                if (e.code === 'Digit0') endLevel(true);
            }
        });
        let touchStartX = 0;
        let touchStartY = 0;
        let touchHandled = false;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchHandled = false;
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!isPlaying || touchHandled) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
                touchHandled = true;
                if (dx > 0) { manualBoostTimer = MANUAL_CONTROL_DURATION; manualSlowTimer = 0; }
                else { manualSlowTimer = MANUAL_CONTROL_DURATION; manualBoostTimer = 0; }
            }
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (!touchHandled && isPlaying) player.jump();
        }, { passive: false });
        window.addEventListener('resize', resize);
        setInterval(update, 1000/60);
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
